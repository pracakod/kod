
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Symulator Żurawia PRO</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #2b3a42;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; user-select: none;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* WIRTUALNE JOYSTICKI */
        .joystick-zone {
            position: absolute; bottom: 30px; width: 100px; height: 100px;
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%; touch-action: none; z-index: 20; backdrop-filter: blur(4px);
        }
        #joy-left { left: 20px; } #joy-right { right: 20px; }
        .joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
            margin-top: -20px; margin-left: -20px;
            background: radial-gradient(circle at 30% 30%, #f1c40f, #e67e22);
            border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.8), inset 0 -3px 5px rgba(0,0,0,0.3);
            pointer-events: none; transition: transform 0.05s linear;
        }
        .joy-label { position: absolute; top: -25px; width: 100%; text-align: center; color: white; font-size: 0.7rem; font-weight: bold; text-shadow: 1px 1px 2px black; }

        /* PRZYCISKI AKCJI (Bardzo Małe) */
        #work-container { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 20; display: flex; gap: 8px; 
        }
        .action-btn {
            background-color: #c0392b; color: white; border: 1px solid #e74c3c; 
            padding: 4px 8px; font-size: 0.55rem; font-weight: bold; border-radius: 4px; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.6); text-transform: uppercase; transition: all 0.2s;
        }
        .action-btn:active { transform: scale(0.95); }
        
        
        #lightBtn { background-color: #7f8c8d; border-color: #95a5a6; }
        #lightBtn.active { background-color: #f1c40f; border-color: #f39c12; color: #000; }
        
        #camBtn { background-color: #2980b9; border-color: #3498db; }
        #camBtn.active { background-color: #1f618d; }

        /* JOYSTICK JAZDY - góra lewa */
        #joy-drive {
            position: absolute; top: 20px; left: 20px;
            width: 90px; height: 90px;
            background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.25);
            border-radius: 50%; touch-action: none; z-index: 20; backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <div id="joy-drive"><div class="joystick-knob" id="knob-drive"></div></div>

    <div id="joy-left" class="joystick-zone"><div class="joystick-knob" id="knob-left"></div></div>
    
    <div id="work-container">
        <button id="camBtn" class="action-btn">🎥 WIDOK</button>
        <button id="lightBtn" class="action-btn active">💡 ŚWIATŁA</button>
    </div>

    <div id="kg-counter" style="
        position:fixed; top:14px; right:14px; z-index:30;
        background:rgba(0,0,0,0.75); border:2px solid #f1c40f;
        border-radius:10px; padding:8px 14px; color:white;
        font-family:monospace; font-size:13px; text-align:center;
        backdrop-filter:blur(4px); min-width:110px;
    ">
        <div style="color:#f1c40f;font-weight:bold;font-size:10px;letter-spacing:1px;">ROZDRABNIARKA</div>
        <div id="kg-value" style="font-size:26px;font-weight:bold;color:#2ecc71;line-height:1.2;">0</div>
        <div style="color:#aaa;font-size:10px;">kg złomu</div>
    </div>
    
    <div id="joy-right" class="joystick-zone"><div class="joystick-knob" id="knob-right"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- KLASA JOYSTICKA ---
        class Joystick {
            constructor(zoneId, knobId) {
                this.zone = document.getElementById(zoneId); this.knob = document.getElementById(knobId);
                this.active = false; this.value = { x: 0, y: 0 }; this.origin = { x: 0, y: 0 }; this.maxDist = 35;
                this.zone.addEventListener('pointerdown', this.start.bind(this));
                window.addEventListener('pointermove', this.move.bind(this));
                window.addEventListener('pointerup', this.end.bind(this));
                window.addEventListener('pointerleave', this.end.bind(this));
            }
            start(e) { this.active = true; this.origin = { x: e.clientX, y: e.clientY }; }
            move(e) {
                if (!this.active) return;
                let dx = e.clientX - this.origin.x, dy = e.clientY - this.origin.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > this.maxDist) { dx = (dx/dist)*this.maxDist; dy = (dy/dist)*this.maxDist; }
                this.knob.style.transform = `translate(${dx}px, ${dy}px)`;
                this.value.x = dx / this.maxDist; this.value.y = dy / this.maxDist; 
            }
            end(e) { this.active = false; this.knob.style.transform = `translate(0px, 0px)`; this.value = { x: 0, y: 0 }; }
        }
        const joyLeft = new Joystick('joy-left', 'knob-left');
        const joyRight = new Joystick('joy-right', 'knob-right');
        const joyDrive = new Joystick('joy-drive', 'knob-drive');

        // --- KONFIGURACJA SCENY ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#3a80c0');
        scene.fog = new THREE.FogExp2('#7ab8d8', 0.004);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(-25, 20, 30); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05; controls.maxPolarAngle = Math.PI / 2 - 0.05;

        // --- OŚWIETLENIE ---
        const ambientLight = new THREE.HemisphereLight(0xffffff, 0x444455, 0.6);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.5);
        sunLight.position.set(30, 40, 20);
        sunLight.castShadow = true;
        sunLight.shadow.camera.top = 30; sunLight.shadow.camera.bottom = -30;
        sunLight.shadow.camera.left = -30; sunLight.shadow.camera.right = 30;
        sunLight.shadow.mapSize.width = 2048; sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.bias = -0.0005;
        scene.add(sunLight);

        // --- PROCEDURALNE TEKSTURY ---
        function createHazardTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f1c40f'; ctx.fillRect(0,0,512,512); 
            ctx.fillStyle = '#111';
            for(let i = -512; i < 1024; i += 60) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i+30, 0);
                ctx.lineTo(i+30-512, 512); ctx.lineTo(i-512, 512); ctx.fill();
            }
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; return tex;
        }

        function createGrillTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#111'; ctx.fillRect(0,0,256,256);
            ctx.fillStyle = '#333';
            for(let y = 0; y < 256; y += 12) { ctx.fillRect(0, y, 256, 4); }
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; return tex;
        }

        function createGridTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#22252a'; ctx.fillRect(0,0,512,512);
            ctx.strokeStyle = '#1a1c20'; ctx.lineWidth = 4;
            for(let i=0; i<=512; i+=64) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,512); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(512,i); ctx.stroke();
            }
            const tex = new THREE.CanvasTexture(canvas); 
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(30, 30);
            return tex;
        }

        // --- MATERIAŁY PBR ---
        const paintMaterial = new THREE.MeshPhysicalMaterial({ 
            color: 0x1E90FF, roughness: 0.4, metalness: 0.2, clearcoat: 0.5, clearcoatRoughness: 0.2 
        });
        const darkMetal = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.7, metalness: 0.6 });
        const chromeMetal = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.1, metalness: 0.95 }); 
        const hazardMaterial = new THREE.MeshStandardMaterial({ map: createHazardTexture(), roughness: 0.5 });
        const rustMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9, metalness: 0.2 });
        const grillMaterial = new THREE.MeshStandardMaterial({ map: createGrillTexture(), roughness: 0.8 });
        const lampMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, emissive: 0xffffff, emissiveIntensity: 1.0 });
        const glassMaterial = new THREE.MeshPhysicalMaterial({ 
            color: 0xaaaaaa, metalness: 0.1, roughness: 0.05, transparent: true, transmission: 0.9, opacity: 1.0,
            side: THREE.DoubleSide
        });

        // --- BUDOWA ŻURAWIA ---
        const craneGroup = new THREE.Group(); scene.add(craneGroup);

        const baseGroup = new THREE.Group(); craneGroup.add(baseGroup);
        const baseMesh = new THREE.Mesh(new THREE.BoxGeometry(4.0, 1.2, 5.0), darkMetal);
        baseMesh.position.set(0, 0.6, 0); baseMesh.castShadow = baseMesh.receiveShadow = true; baseGroup.add(baseMesh);

        function createTrack(xPos) {
            const trackGrp = new THREE.Group(); trackGrp.position.set(xPos, 0.7, 0);
            const beltGeo = new THREE.BoxGeometry(1.3, 1.4, 6.2);
            const belt = new THREE.Mesh(beltGeo, darkMetal); belt.castShadow = true; trackGrp.add(belt);
            for(let z = -2.5; z <= 2.5; z += 1.0) {
                const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.65, 1.25, 16), chromeMetal);
                wheel.rotation.z = Math.PI/2; wheel.position.set(0, -0.05, z); wheel.castShadow = true; trackGrp.add(wheel);
            }
            return trackGrp;
        }
        baseGroup.add(createTrack(-2.5)); baseGroup.add(createTrack(2.5));

        const bodyPivot = new THREE.Group(); bodyPivot.position.set(0, 1.4, 0); craneGroup.add(bodyPivot);
        const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(3.6, 2.5, 5.0), paintMaterial);
        bodyMesh.position.set(0, 1.25, -0.2); bodyMesh.castShadow = bodyMesh.receiveShadow = true; bodyPivot.add(bodyMesh);

        // KABINA
        const cabinGroup = new THREE.Group(); cabinGroup.position.set(1.55, 1.55, 1.0); bodyPivot.add(cabinGroup);
        const cabFrame = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2.8, 2.0), darkMetal); cabFrame.position.set(0, 1.4, 0); cabinGroup.add(cabFrame);
        const cabGlass = new THREE.Mesh(new THREE.BoxGeometry(1.3, 2.6, 1.9), glassMaterial); cabGlass.position.set(0, 1.4, 0); cabinGroup.add(cabGlass);
        const seat = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.6), darkMetal); seat.position.set(0, 0.5, -0.3); cabinGroup.add(seat);
        const cabinCamPos = new THREE.Object3D(); cabinCamPos.position.set(0, 1.6, -0.2); cabinGroup.add(cabinCamPos);

        const grill = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 2), grillMaterial); grill.position.set(-1.82, 1.2, -1); grill.rotation.y = -Math.PI/2; bodyPivot.add(grill); 
        const exhaust = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 1.5, 8), darkMetal); exhaust.position.set(-1.2, 3.2, -2.0); bodyPivot.add(exhaust);
        // NAPIS "340" na boku nadwozia (canvas texture)
        const labelCanvas = document.createElement('canvas');
        labelCanvas.width = 256; labelCanvas.height = 128;
        const lctx = labelCanvas.getContext('2d');
        lctx.fillStyle = 'transparent';
        lctx.clearRect(0,0,256,128);
        lctx.font = 'bold 90px Arial Black, Arial';
        lctx.fillStyle = '#ffffff';
        lctx.textAlign = 'center';
        lctx.textBaseline = 'middle';
        lctx.fillText('340', 128, 64);
        const labelTex = new THREE.CanvasTexture(labelCanvas);
        const labelMat = new THREE.MeshStandardMaterial({ map: labelTex, transparent: true, depthWrite: false });
        const labelMesh = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 1.1), labelMat);
        labelMesh.position.set(-1.82, 1.5, 0.2);
        labelMesh.rotation.y = -Math.PI/2;
        bodyPivot.add(labelMesh);

        // RAMIONA
        // Koparka: boom wychodzi z PRZODU-LEWEJ strony ciała, pochyla się DO PRZODU (+Z)
        // W Three.js: rotation.x ujemne = czubek +Y obraca się ku +Z (do przodu) ✓
        function addJointPin(parent, radius, length) {
            const pin = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, length, 16), chromeMetal);
            pin.rotation.z = Math.PI/2; parent.add(pin);
        }

        // BOOM (arm1): pivot na przodzie ciała, obraca się w płaszczyźnie przód-tył
        const arm1Pivot = new THREE.Group();
        arm1Pivot.position.set(-0.5, 3.0, 1.8); // przód ciała (z=+1.8), wyżej
        bodyPivot.add(arm1Pivot);
        addJointPin(arm1Pivot, 0.4, 2.0);
        const boomLength = 10;
        const arm1Mesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, boomLength, 1.2), paintMaterial);
        arm1Mesh.position.set(0, boomLength / 2, 0);
        arm1Mesh.castShadow = true;
        arm1Pivot.add(arm1Mesh);
        arm1Pivot.rotation.x = 1.38;

        // STICK (arm2): pivot na czubku booma, mesh idzie w dół (-Y)
        const arm2Pivot = new THREE.Group();
        arm2Pivot.position.set(0, boomLength, 0);
        arm1Pivot.add(arm2Pivot);
        addJointPin(arm2Pivot, 0.35, 1.4);
        const stickLength = 9;
        const arm2Mesh = new THREE.Mesh(new THREE.BoxGeometry(0.6, stickLength, 0.8), paintMaterial);
        arm2Mesh.position.set(0, -stickLength / 2, 0);
        arm2Mesh.castShadow = true;
        arm2Pivot.add(arm2Mesh);
        arm2Pivot.rotation.x = -2.82;

        const dangerStripe = new THREE.Mesh(new THREE.PlaneGeometry(0.61, 2), hazardMaterial);
        dangerStripe.position.set(0, -stickLength/2, 0.42); arm2Pivot.add(dangerStripe);

        // ŚWIATŁA ROBOCZE (po zdefiniowaniu ramion)
        const workLight1 = new THREE.SpotLight(0xfff5cc, 3.5, 35, Math.PI/5, 0.3, 1.5);
        workLight1.position.set(0, 0.3, 0.6);
        workLight1.target.position.set(0, -8, 6);
        arm1Pivot.add(workLight1); arm1Pivot.add(workLight1.target);

        const workLight2 = new THREE.SpotLight(0xfff5cc, 3.5, 35, Math.PI/5, 0.3, 1.5);
        workLight2.position.set(0, -0.2, 0.5);
        workLight2.target.position.set(0, -6, 5);
        arm2Pivot.add(workLight2); arm2Pivot.add(workLight2.target);

        const lampGeoW = new THREE.SphereGeometry(0.18, 8, 8);
        const lampMatW = new THREE.MeshStandardMaterial({ color: 0xffff99, emissive: 0xffff99, emissiveIntensity: 1.5 });
        const lamp1Mesh = new THREE.Mesh(lampGeoW, lampMatW);
        lamp1Mesh.position.set(0, 0.3, 0.6); arm1Pivot.add(lamp1Mesh);
        const lamp2Mat = new THREE.MeshStandardMaterial({ color: 0xffff99, emissive: 0xffff99, emissiveIntensity: 1.5 });
        const lamp2Mesh = new THREE.Mesh(lampGeoW.clone(), lamp2Mat);
        lamp2Mesh.position.set(0, -0.2, 0.5); arm2Pivot.add(lamp2Mesh);


        // CHWYTAK
        const grapplePivot = new THREE.Group();
        grapplePivot.position.set(0, -stickLength, 0); // dół sticka
        arm2Pivot.add(grapplePivot);
        const grappleBase = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 1.0, 16), paintMaterial); grappleBase.position.set(0, -0.5, 0); grapplePivot.add(grappleBase);
        const claws = [];
        const clawShape = new THREE.Shape(); 
        clawShape.moveTo(0, 0); clawShape.lineTo(0.3, 0); clawShape.lineTo(0.1, -1.0); clawShape.lineTo(0.2, -1.5); clawShape.lineTo(0, -2.5);
        clawShape.lineTo(-0.2, -1.5); clawShape.lineTo(-0.1, -1.0); clawShape.lineTo(-0.3, 0);
        const clawGeo = new THREE.ExtrudeGeometry(clawShape, { depth: 0.3, bevelEnabled: true, bevelSegments: 2, steps: 1, bevelSize: 0.05, bevelThickness: 0.05 });
        clawGeo.translate(0, 0, -0.15); 
        for (let i = 0; i < 4; i++) {
            const yaw = new THREE.Group(); yaw.position.set(0, -1.0, 0); yaw.rotation.y = (i * Math.PI) / 2; 
            const pivot = new THREE.Group(); const mesh = new THREE.Mesh(clawGeo, darkMetal); mesh.position.set(0, -0.2, 0.3); mesh.rotation.x = -0.3; pivot.add(mesh);
            yaw.add(pivot); grapplePivot.add(yaw); claws.push(pivot);
        }
        const payloadMesh = new THREE.Mesh(new THREE.SphereGeometry(0.8, 7, 7), rustMaterial); payloadMesh.position.set(0, -2.2, 0); payloadMesh.visible = false; grapplePivot.add(payloadMesh);

        // REFLEKTOR NA CHWYTAK — świeci pionowo w dół
        const grappleSpot = new THREE.SpotLight(0xffffff, 5.0, 18, Math.PI/6, 0.5, 1.5);
        grappleSpot.position.set(0, 0.2, 0);
        grappleSpot.target.position.set(0, -10, 0); // cel prosto w dół
        grapplePivot.add(grappleSpot);
        grapplePivot.add(grappleSpot.target);
        // Mała lampka widoczna
        const grappleLampMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 2.0 });
        const grappleLamp = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), grappleLampMat);
        grappleLamp.position.set(0, 0.2, 0); grapplePivot.add(grappleLamp);

        // DWA REFLEKTORY NA KABINIE — dodane do cabinGroup (lokalne współrzędne kabiny)
        // cabFrame jest na y=1.4, height=2.8 → top = y=2.8. Przód kabiny = z=+1.0 (half of 2.0)
        const cabSpot1 = new THREE.SpotLight(0xfff8e0, 4.0, 60, Math.PI/7, 0.25, 1.2);
        cabSpot1.position.set(0.35, 2.75, 1.05);
        cabSpot1.target.position.set(6, -3, 25);
        cabinGroup.add(cabSpot1); cabinGroup.add(cabSpot1.target);

        const cabSpot2 = new THREE.SpotLight(0xfff8e0, 4.0, 60, Math.PI/7, 0.25, 1.2);
        cabSpot2.position.set(-0.35, 2.75, 1.05);
        cabSpot2.target.position.set(-6, -3, 25);
        cabinGroup.add(cabSpot2); cabinGroup.add(cabSpot2.target);

        // Obudowy reflektorów (żółte) na przedniej ścianie kabiny
        const headlampMat = new THREE.MeshStandardMaterial({ color: 0xffff99, emissive: 0xffff88, emissiveIntensity: 2.0 });
        const hl1 = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.16, 0.10, 10), headlampMat);
        hl1.rotation.x = Math.PI/2; hl1.position.set(0.35, 2.75, 1.06); cabinGroup.add(hl1);
        const hl2 = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.16, 0.10, 10), headlampMat.clone());
        hl2.rotation.x = Math.PI/2; hl2.position.set(-0.35, 2.75, 1.06); cabinGroup.add(hl2);

        // ŚWIATŁO W KABINIE
        const cabinLight = new THREE.PointLight(0xfff0cc, 1.5, 6, 2);
        cabinLight.position.set(0, 1.8, 0); cabinGroup.add(cabinLight);
        const cabinLampMat = new THREE.MeshStandardMaterial({ color: 0xffeeaa, emissive: 0xffeeaa, emissiveIntensity: 1.5 });
        const cabinLamp = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), cabinLampMat);
        cabinLamp.position.set(0, 2.6, 0); cabinGroup.add(cabinLamp);

        // PRZYCISK ŚWIATEŁ
        let lightsOn = true;
        document.getElementById('lightBtn').addEventListener('click', () => {
            lightsOn = !lightsOn;
            const wi = lightsOn ? 3.5 : 0; const si = lightsOn ? 4.0 : 0; const e = lightsOn ? 1.5 : 0;
            workLight1.intensity = wi; workLight2.intensity = wi;
            cabSpot1.intensity = si; cabSpot2.intensity = si;
            grappleSpot.intensity = lightsOn ? 5.0 : 0;
            cabinLight.intensity = lightsOn ? 1.5 : 0;
            lampMatW.emissiveIntensity = e; lamp2Mat.emissiveIntensity = e;
            hl1.material.emissiveIntensity = lightsOn ? 2.0 : 0;
            hl2.material.emissiveIntensity = lightsOn ? 2.0 : 0;
            cabinLampMat.emissiveIntensity = e;
            document.getElementById('lightBtn').classList.toggle('active', lightsOn);
        });

        // NIEBO — canvas texture jako tło sceny (najpewniejsza metoda)
        const SKY_W = 512, SKY_H = 512;
        const skyCanvas = document.createElement('canvas');
        skyCanvas.width = SKY_W; skyCanvas.height = SKY_H;
        const skyCtx = skyCanvas.getContext('2d');

        // Gradient atmosfery od góry do horyzontu
        const skyGrad = skyCtx.createLinearGradient(0, 0, 0, SKY_H);
        skyGrad.addColorStop(0.0,  '#0d1f3c');
        skyGrad.addColorStop(0.3,  '#1a4a8a');
        skyGrad.addColorStop(0.55, '#3a80c0');
        skyGrad.addColorStop(0.75, '#7ab8d8');
        skyGrad.addColorStop(0.87, '#f0c87a');
        skyGrad.addColorStop(0.94, '#e8855a');
        skyGrad.addColorStop(1.0,  '#c04030');
        skyCtx.fillStyle = skyGrad;
        skyCtx.fillRect(0, 0, SKY_W, SKY_H);

        // Słońce przy horyzoncie
        const sunX = SKY_W * 0.7, sunY = SKY_H * 0.88;
        const sunCore = skyCtx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 40);
        sunCore.addColorStop(0,   'rgba(255,255,220,1)');
        sunCore.addColorStop(0.2, 'rgba(255,220,80,1)');
        sunCore.addColorStop(0.5, 'rgba(255,140,40,0.6)');

        function initAudio() {

        function playShredderSound() {
            initAudio();
            if (shredderNodes) return; // już gra

            const ctx = audioCtx;
            const master = ctx.createGain();
            master.gain.setValueAtTime(0, ctx.currentTime);
            master.gain.linearRampToValueAtTime(0.45, ctx.currentTime + 0.3);
            master.connect(ctx.destination);

            // Szum jako baza (grinding)
            const bufLen = ctx.sampleRate * 2;
            const buffer = ctx.createBuffer(1, bufLen, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
            const noise = ctx.createBufferSource();
            noise.buffer = buffer; noise.loop = true;
            const noiseFilter = ctx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.value = 320;
            noiseFilter.Q.value = 2.5;
            noise.connect(noiseFilter); noiseFilter.connect(master);
            noise.start();

            // Niski pomruk silnika
            const osc1 = ctx.createOscillator();
            osc1.type = 'sawtooth'; osc1.frequency.value = 58;
            const g1 = ctx.createGain(); g1.gain.value = 0.18;
            osc1.connect(g1); g1.connect(master); osc1.start();

            // Metaliczne uderzenia (losowe kliknięcia)
            function scheduleTick() {
                if (!shredderNodes) return;
                const tick = ctx.createOscillator();
                tick.type = 'square'; tick.frequency.value = 180 + Math.random() * 120;
                const tg = ctx.createGain();
                tg.gain.setValueAtTime(0.25, ctx.currentTime);
                tg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
                tick.connect(tg); tg.connect(master);
                tick.start(); tick.stop(ctx.currentTime + 0.08);
                setTimeout(scheduleTick, 60 + Math.random() * 120);
            }
            scheduleTick();

            shredderNodes = { noise, osc1, master };
        }

        function stopShredderSound() {
            if (!shredderNodes || !audioCtx) return;
            const { master, noise, osc1 } = shredderNodes;
            master.gain.setValueAtTime(master.gain.value, audioCtx.currentTime);
            master.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
            setTimeout(() => {
                try { noise.stop(); osc1.stop(); } catch(e) {}
                shredderNodes = null;
            }, 700);
        }
        const droppedScraps = [];
        let actualClawRot = -0.5;
        let targetClawRot = -0.5;
        let totalKg = 0;
        const kgEl = document.getElementById('kg-value');
        function addKg(kg) {
            totalKg += kg;
            kgEl.textContent = totalKg;
            kgEl.style.color = totalKg > 500 ? '#e74c3c' : totalKg > 200 ? '#f39c12' : '#2ecc71';
        }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const oldPos = craneGroup.position.clone();

            // Jazda joyDrive (góra-lewo) + klawiatura
            const fwd  = -joyDrive.value.y + (keys.up ? 1 : 0) - (keys.down ? 1 : 0);
            const turn =  joyDrive.value.x + (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
            craneGroup.translateZ(fwd * 3.5 * delta);
            craneGroup.rotation.y -= turn * 1.0 * delta;

            if (cameraView === 0) {
                controls.target.lerp(new THREE.Vector3(craneGroup.position.x, craneGroup.position.y + 4, craneGroup.position.z), 0.05);
            } else {
                // Pozycja kamery = cabinCamPos w świecie
                const p = new THREE.Vector3(); cabinCamPos.getWorldPosition(p); camera.position.copy(p);
                // Kierunek patrzenia = obrót kabiny + fpvYaw/Pitch od gracza
                const cabinWorldQuat = new THREE.Quaternion(); cabinCamPos.getWorldQuaternion(cabinWorldQuat);
                const localQuat = new THREE.Quaternion();
                localQuat.setFromEuler(new THREE.Euler(fpvPitch, fpvYaw, 0, 'YXZ'));
                camera.quaternion.copy(cabinWorldQuat).multiply(localQuat);
            }

            const oldBoom = arm1Pivot.rotation.x; const oldStick = arm2Pivot.rotation.x;
            const gp = new THREE.Vector3(); grapplePivot.getWorldPosition(gp);

            // LEWY JOYSTICK: X=obrót (wolniej), Y=STICK (małe ramię)
            bodyPivot.rotation.y -= joyLeft.value.x * 0.4 * delta;
            arm2Pivot.rotation.x += joyLeft.value.y * 1.2 * delta;

            // PRAWY JOYSTICK: X=chwytak, Y=BOOM odwrócony (dół=podnieś, góra=opuść)
            targetClawRot -= joyRight.value.x * 2.0 * delta;
            targetClawRot = Math.max(-0.5, Math.min(targetClawRot, 0.5));
            arm1Pivot.rotation.x -= joyRight.value.y * 0.7 * delta;

            // --- LIMITY z debug session ---
            arm1Pivot.rotation.x = Math.max(-0.11, Math.min(arm1Pivot.rotation.x, 1.38));
            arm2Pivot.rotation.x = Math.max(-2.82, Math.min(arm2Pivot.rotation.x, -0.28));

            // Fizyka podłogi (Chwytak nie przechodzi przez ziemię)
            const newGP = new THREE.Vector3(); 
            craneGroup.updateMatrixWorld(true);
            grapplePivot.getWorldPosition(newGP);
            if (newGP.y < 2.2 && newGP.y < gp.y) {
                arm1Pivot.rotation.x = oldBoom;
                arm2Pivot.rotation.x = oldStick;
            }

            grapplePivot.rotation.x = -(arm1Pivot.rotation.x + arm2Pivot.rotation.x);
            const prevClawRot = actualClawRot;
            actualClawRot += (targetClawRot - actualClawRot) * Math.min(8 * delta, 1);
            claws.forEach(c => c.rotation.x = actualClawRot);

            // KOLIZJA chwytak ↔ Arjes lejek — cofnij ramiona jeśli chwytak wchodzi w lejek
            craneGroup.updateMatrixWorld(true);
            shredderGroup.updateMatrixWorld(true);
            const grappleW = new THREE.Vector3(); grapplePivot.getWorldPosition(grappleW);
            const grappleLocal = shredderGroup.worldToLocal(grappleW.clone());
            // Kolizja z lejkiem (szerszy niż korpus) i górą maszyny
            const colHalfX = hopW/2 + 0.3;
            const colHalfZ = hopD2/2 + 0.3;
            const colYmin  = bodyH + 0.2;
            const colYmax  = bodyH + hopH2 + 1.0;
            if (Math.abs(grappleLocal.x) < colHalfX &&
                grappleLocal.y > colYmin && grappleLocal.y < colYmax &&
                Math.abs(grappleLocal.z) < colHalfZ) {
                arm1Pivot.rotation.x = oldBoom;
                arm2Pivot.rotation.x = oldStick;
                grapplePivot.rotation.x = -(arm1Pivot.rotation.x + arm2Pivot.rotation.x);
            }

            // PICKUP: gdy chwytak się zamyka i jest blisko złomu
            if (targetClawRot > 0.2 && !payloadMesh.visible) {
                craneGroup.updateMatrixWorld(true);
                const grapplePos = new THREE.Vector3(); grapplePivot.getWorldPosition(grapplePos);
                const scrapWorldPos = new THREE.Vector3(0, 0, 18);
                if (grapplePos.distanceTo(scrapWorldPos) < 9.0 && grapplePos.y < 8.0) {
                    payloadMesh.visible = true;
                }
            }

            // DROP: gdy chwytak się otwiera
            if (targetClawRot < -0.2 && payloadMesh.visible) {
                payloadMesh.visible = false;
                craneGroup.updateMatrixWorld(true);
                shredderGroup.updateMatrixWorld(true);
                const dropPos = new THREE.Vector3(); grapplePivot.getWorldPosition(dropPos);
                // Punkt wlotu (lejek) maszyny w świecie
                const hopperPos = new THREE.Vector3(0, bodyH+1.5, 0);
                shredderGroup.localToWorld(hopperPos);
                const dist = dropPos.distanceTo(hopperPos);
                if (dist < 6.0) {
                    // TRAFIŁ W MASZYNĘ — uruchom taśmę i dźwięk
                    const kg = Math.floor(Math.random() * 230 + 120);
                    addKg(kg);
                    kgEl.style.transform = 'scale(1.4)';
                    setTimeout(() => kgEl.style.transform = 'scale(1)', 300);
                    beltFragments.forEach(f => f.mesh.visible = true);
                    beltScrapT = 0;
                    playShredderSound();
                    setTimeout(stopShredderSound, 5500);
                    // Po dotarciu taśmy — dodaj kawałki do hałdy
                    const delay = 1000 / 0.32 * 0.001 * beltLen; // czas przejazdu taśmy ~3s
                    setTimeout(() => {
                        const count = 6 + Math.floor(Math.random() * 6); // 6-12 kawałków
                        for (let i = 0; i < count; i++) {
                            setTimeout(addToPile, i * 180);
                        }
                    }, 3200);

                } else {
                    // Upuścił obok
                    const scrap = new THREE.Mesh(new THREE.BoxGeometry(0.8,0.8,0.8), rustMaterial);
                    scrap.position.copy(dropPos); scene.add(scrap);
                    droppedScraps.push({ mesh: scrap, velocityY: 0 });
                }
            }

            // Pozycjonuj hałdę na końcu taśmy (raz)
            if (!pilePositioned) {
                shredderGroup.updateMatrixWorld(true);
                beltGroup.updateMatrixWorld(true);
                const beltEnd = new THREE.Vector3(-beltLen/2, 0.2, 0);
                beltGroup.localToWorld(beltEnd);
                pileGroup.position.set(beltEnd.x, 0, beltEnd.z);
                pileGroup.userData.beltEndY = beltEnd.y; // zapamiętaj wysokość końca taśmy
                pilePositioned = true;
            }

            // Animacja kawałków spadających na hałdę
            for (let i = pileChunks.length - 1; i >= 0; i--) {
                const c = pileChunks[i];
                if (c.falling) {
                    c.mesh.position.y -= 8 * delta;
                    if (c.mesh.position.y <= c.targetY) {
                        c.mesh.position.y = c.targetY;
                        c.falling = false;
                    }
                }
            }
            if (beltScrapT >= 0) {
                beltScrapT += delta * 0.32;
                beltFragments.forEach(({ mesh, tx, tz }) => {
                    // tx to stały offset startu (0..1) — każdy kawałek startuje z prawej z opóźnieniem
                    const t = beltScrapT - tx; // t rośnie od 0 (kiedy ten fragment startuje)
                    if (t < 0) {
                        mesh.visible = false;
                    } else if (t < 1.05) {
                        mesh.visible = true;
                        mesh.position.x = (beltLen/2 - 0.5) - t * beltLen;
                        mesh.position.y = 0.28;
                        mesh.position.z = tz;
                    } else {
                        mesh.visible = false;
                    }
                });
                if (beltScrapT > 2.1) { beltScrapT = -1; beltFragments.forEach(f => f.mesh.visible = false); }
            }
            // Obracaj wały rozdrabniarki
            shafts[0].rotation.z += delta * 1.8;
            shafts[1].rotation.z -= delta * 1.8;

            for (let i = droppedScraps.length - 1; i >= 0; i--) {
                const d = droppedScraps[i]; d.velocityY -= 20 * delta; d.mesh.position.y += d.velocityY * delta;
                if (d.mesh.position.y <= 0.5) { d.mesh.position.y = 0.5; droppedScraps.splice(i, 1); }
            }

            if (cameraView === 0) controls.update();
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        animate();
    </script>
</body>
</html>
